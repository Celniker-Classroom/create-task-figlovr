<!--My Create Task is a travel expenses calculator, where users can input the costs of what they buy during their travels,
as well as their budget, in order to create a table of their spending. The program receives and displays the budgets, item
names, item costs, and number of items purchased, and it uses these values to calculate the total spending.-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Travel Expenses Calculator</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Travel Expenses Calculator</h1>

    <p id="msg"> </p>
    <input type="text" id="budget">
    <button id="budgetEntry" disabled>Enter Budget</button>

    <h3>Expenses:</h3>

    <table id="expenseTable">
      <tr>
        <th>Item</th>
        <th>Cost</th>
        <th>Times Purchased</th>
        <th>Total Cost</th>
      </tr>
      <tr>
        <td><input type="text" id="itemEntry"></td>
        <td><input type="text" id="costEntry"></td>
        <td><input type="text" id="timesPurchased"></td>
        <td id = "totalCost"> </td>
      </tr>
    </table>

    <button id="entry">Enter an Expense</button>

    <h3 id="budgetDisplay">Your Budget: </h3>
    <h3 id="totalSpend">Total Spent:</h3>

    
</body>
</html>
